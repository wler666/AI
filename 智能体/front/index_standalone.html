<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>智能体助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Design tokens
   ============================================================ */
:root {
  --bg-top: #eaf3fc;
  --bg-bottom: #f8fbff;
  --surface: #ffffff;
  --surface-tint: #eef6fd;

  --blue-900: #123a66;
  --blue-700: #1d5bb8;
  --blue-600: #2f6fed;
  --blue-500: #4f8bf2;
  --blue-200: #cfe4fa;
  --blue-100: #e4f0fb;

  --text-strong: #16324f;
  --text-muted: #64809e;
  --text-faint: #93abc4;

  --border: #dbe9f7;
  --border-soft: #e8f2fb;

  --shadow-soft: 0 8px 24px -12px rgba(31, 90, 158, 0.18);
  --shadow-btn: 0 6px 16px -6px rgba(47, 111, 237, 0.45);

  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;

  --font-body: "Noto Sans SC", "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: "Manrope", "Noto Sans SC", sans-serif;
}

* { box-sizing: border-box; }

html, body {
  height: 100%;
  margin: 0;
}

body {
  font-family: var(--font-body);
  color: var(--text-strong);
  background:
    radial-gradient(1200px 500px at 15% -10%, #dcedfb 0%, transparent 60%),
    radial-gradient(900px 400px at 100% 0%, #e7f2fc 0%, transparent 55%),
    linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 55%);
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   App shell
   ============================================================ */
.app {
  max-width: 860px;
  margin: 0 auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 20px 20px 0;
}

/* ---------- top bar ---------- */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: blur(14px);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-soft);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-mark {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: linear-gradient(145deg, var(--blue-500), var(--blue-700));
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 14px -4px rgba(47, 111, 237, 0.55);
}

.brand-mark-dot {
  width: 14px;
  height: 14px;
  border-radius: 4px;
  background: #ffffff;
  transform: rotate(45deg);
  opacity: 0.92;
}

.brand-text h1 {
  margin: 0;
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 800;
  letter-spacing: 0.1px;
  color: var(--blue-900);
}

.status {
  margin: 2px 0 0;
  font-size: 12.5px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #34c77b;
  box-shadow: 0 0 0 3px rgba(52, 199, 123, 0.18);
  animation: pulse 2.2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(52, 199, 123, 0.18); }
  50% { box-shadow: 0 0 0 6px rgba(52, 199, 123, 0.10); }
}

.reset-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  border: 1px solid var(--border);
  background: #ffffff;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 12.5px;
  font-weight: 500;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.reset-btn:hover {
  color: var(--blue-700);
  border-color: var(--blue-200);
  background: var(--blue-100);
}

/* ---------- message area ---------- */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 26px 6px 20px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  scrollbar-width: thin;
  scrollbar-color: var(--blue-200) transparent;
}
.chat::-webkit-scrollbar { width: 6px; }
.chat::-webkit-scrollbar-thumb { background: var(--blue-200); border-radius: 6px; }

.day-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 4px;
}
.day-divider span {
  font-size: 11.5px;
  color: var(--text-faint);
  background: rgba(255, 255, 255, 0.7);
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border-soft);
}

.msg-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  max-width: 82%;
  animation: rise 0.28s ease both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-row.ai { align-self: flex-start; }
.msg-row.user { align-self: flex-end; flex-direction: row; }

.avatar {
  flex-shrink: 0;
  width: 30px;
  height: 30px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
}

.ai-avatar {
  background: linear-gradient(145deg, var(--blue-500), var(--blue-700));
  color: #fff;
}

.user-avatar {
  background: var(--blue-900);
  color: #fff;
}

.bubble-col {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.msg-row.user .bubble-col { align-items: flex-end; }

.bubble {
  font-size: 14.5px;
  line-height: 1.62;
  padding: 12px 16px;
  word-break: break-word;
}

.ai-bubble {
  background: var(--surface);
  color: var(--text-strong);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-md) var(--radius-md) var(--radius-md) 4px;
  box-shadow: 0 3px 10px -6px rgba(31, 90, 158, 0.15);
}

.user-bubble {
  background: linear-gradient(150deg, var(--blue-600), var(--blue-700));
  color: #ffffff;
  border-radius: var(--radius-md) var(--radius-md) 4px var(--radius-md);
  box-shadow: var(--shadow-btn);
}

.time {
  font-size: 10.5px;
  color: var(--text-faint);
  padding: 0 4px;
}

/* typing indicator */
.typing-bubble {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 14px 16px;
}
.typing-bubble span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--blue-500);
  opacity: 0.5;
  animation: bounce 1.1s infinite ease-in-out;
}
.typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* ---------- composer ---------- */
.composer {
  padding: 14px 0 18px;
}

.composer-inner {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 10px 10px 10px 18px;
  box-shadow: var(--shadow-soft);
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}

.composer-inner:focus-within {
  border-color: var(--blue-500);
  box-shadow: 0 0 0 4px var(--blue-100), var(--shadow-soft);
}

.composer-input {
  flex: 1;
  border: none;
  outline: none;
  resize: none;
  background: transparent;
  font-family: var(--font-body);
  font-size: 14.5px;
  line-height: 1.5;
  color: var(--text-strong);
  padding: 8px 0;
  max-height: 140px;
}
.composer-input::placeholder { color: var(--text-faint); }

.send-btn {
  flex-shrink: 0;
  width: 40px;
  height: 40px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(145deg, var(--blue-500), var(--blue-700));
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: var(--shadow-btn);
  transition: transform 0.12s ease, filter 0.12s ease;
}
.send-btn:hover { filter: brightness(1.06); }
.send-btn:active { transform: scale(0.94); }
.send-btn:disabled {
  background: var(--blue-200);
  box-shadow: none;
  cursor: not-allowed;
}

.composer-hint {
  margin: 8px 4px 0;
  font-size: 11px;
  color: var(--text-faint);
  text-align: center;
}

/* ---------- responsive ---------- */
@media (max-width: 600px) {
  .app { padding: 12px 12px 0; }
  .msg-row { max-width: 92%; }
  .brand-text h1 { font-size: 15px; }
  .reset-btn span { display: none; }
}

/* ---------- reduced motion ---------- */
@media (prefers-reduced-motion: reduce) {
  .msg-row, .status-dot, .typing-bubble span { animation: none !important; }
}

/* ---------- focus visibility ---------- */
button:focus-visible,
textarea:focus-visible {
  outline: 2px solid var(--blue-500);
  outline-offset: 2px;
}

</style>
</head>
<body>

  <div class="app">

    <!-- 顶部栏 -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">
          <span class="brand-mark-dot"></span>
        </div>
        <div class="brand-text">
          <h1>耀辰智能体</h1>
          <p class="status"><span class="status-dot"></span>在线 · 随时为你解答</p>
        </div>
      </div>
      <button class="reset-btn" id="resetBtn" title="清空对话">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
        <span>清空对话</span>
      </button>
    </header>

    <!-- 消息区域 -->
    <main class="chat" id="chat">

      <div class="day-divider"><span>今天</span></div>

      <div class="msg-row ai">
        <div class="avatar ai-avatar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" fill="currentColor"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="bubble-col">
          <div class="bubble ai-bubble">
            你好，我是耀辰智能体，可以帮你查询公司资料、解答产品与营销问题。有什么可以帮你的吗？
          </div>
          <span class="time">09:12</span>
        </div>
      </div>

      <div class="msg-row user">
        <div class="bubble-col">
          <div class="bubble user-bubble">
            帮我看看9月的营销投入和产出情况
          </div>
          <span class="time">09:13</span>
        </div>
        <div class="avatar user-avatar">我</div>
      </div>

      <div class="msg-row ai">
        <div class="avatar ai-avatar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" fill="currentColor"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="bubble-col">
          <div class="bubble ai-bubble">
            9月营销总投入为286万元，环比增长12.4%；带动全渠道销售额约2,150万元，整体ROI为7.5。需要我拆解到具体渠道数据吗？
          </div>
          <span class="time">09:13</span>
        </div>
      </div>

    </main>

    <!-- 输入区域 -->
    <footer class="composer">
      <div class="composer-inner">
        <textarea
          id="msgInput"
          class="composer-input"
          placeholder="输入消息，Enter 发送，Shift+Enter 换行"
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" title="发送">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
      <p class="composer-hint">智能体的回答可能不完全准确，重要信息请以实际数据为准。</p>
    </footer>

  </div>

<script>
// ============================================================
// 智能体聊天前端交互逻辑
// 当前为演示模式：发送消息后会返回一句模拟回复。
// 后续接入真实后端时，只需修改 getAgentReply() 函数即可。
// ============================================================

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const resetBtn = document.getElementById("resetBtn");

// -------------------------------------------------------------
// 工具函数
// -------------------------------------------------------------
function nowTime() {
  const d = new Date();
  const h = String(d.getHours()).padStart(2, "0");
  const m = String(d.getMinutes()).padStart(2, "0");
  return `${h}:${m}`;
}

function scrollToBottom() {
  chat.scrollTop = chat.scrollHeight;
}

// 追加一条消息气泡。role: 'ai' | 'user'
function appendMessage(role, text, imageBase64 = null) {
  const row = document.createElement("div");
  row.className = `msg-row ${role}`;

  const avatar = document.createElement("div");
  if (role === "ai") {
    avatar.className = "avatar ai-avatar";
    avatar.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" fill="currentColor"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  } else {
    avatar.className = "avatar user-avatar";
    avatar.textContent = "我";
  }

  const col = document.createElement("div");
  col.className = "bubble-col";

  const bubble = document.createElement("div");
  bubble.className = `bubble ${role === "ai" ? "ai-bubble" : "user-bubble"}`;
  bubble.textContent = text;

  if (imageBase64) {
    const img = document.createElement("img");
    img.src = `data:image/png;base64,${imageBase64}`;
    img.style.maxWidth = "100%";
    img.style.borderRadius = "10px";
    img.style.marginTop = "10px";
    img.style.display = "block";
    bubble.appendChild(img);
  }

  const time = document.createElement("span");
  time.className = "time";
  time.textContent = nowTime();

  col.appendChild(bubble);
  col.appendChild(time);

  if (role === "ai") {
    row.appendChild(avatar);
    row.appendChild(col);
  } else {
    row.appendChild(col);
    row.appendChild(avatar);
  }

  chat.appendChild(row);
  scrollToBottom();
  return { row, bubble };
}

// 显示"正在输入"占位气泡，返回一个用于移除/替换它的函数
function showTyping() {
  const row = document.createElement("div");
  row.className = "msg-row ai";

  const avatar = document.createElement("div");
  avatar.className = "avatar ai-avatar";
  avatar.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" fill="currentColor"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  const col = document.createElement("div");
  col.className = "bubble-col";

  const bubble = document.createElement("div");
  bubble.className = "bubble ai-bubble typing-bubble";
  bubble.innerHTML = "<span></span><span></span><span></span>";

  col.appendChild(bubble);
  row.appendChild(avatar);
  row.appendChild(col);
  chat.appendChild(row);
  scrollToBottom();

  return row;
}

// -------------------------------------------------------------
// 与后端智能体通信
// -------------------------------------------------------------
async function getAgentReply(userText) {
  const response = await fetch("http://127.0.0.1:8000/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ message: userText }),
  });

  if (!response.ok) {
    throw new Error(`后端服务返回了错误状态：${response.status}`);
  }

  const data = await response.json();

  return {
    text: data.reply,
    imageBase64: data.image_base64,
  };
}

// -------------------------------------------------------------
// 发送逻辑
// -------------------------------------------------------------
async function handleSend() {
  const text = input.value.trim();
  if (!text) return;

  appendMessage("user", text);
  input.value = "";
  autoResize();
  sendBtn.disabled = true;

  const typingRow = showTyping();

  try {
    const agentResult = await getAgentReply(text);
    typingRow.remove();
    appendMessage("ai", agentResult.text, agentResult.imageBase64);
  } catch (err) {
    typingRow.remove();
    appendMessage("ai", "抱歉，连接智能体服务失败，请稍后重试。");
    console.error(err);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

// 输入框自适应高度
function autoResize() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 140) + "px";
}

// -------------------------------------------------------------
// 事件绑定
// -------------------------------------------------------------
input.addEventListener("input", autoResize);

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

sendBtn.addEventListener("click", handleSend);

resetBtn.addEventListener("click", () => {
  if (!confirm("确定要清空当前对话吗？")) return;
  chat.innerHTML = "";
  appendMessage("ai", "对话已清空。有什么可以帮你的吗？");
});

// 初始滚动到底部
scrollToBottom();

</script>
</body>
</html>
